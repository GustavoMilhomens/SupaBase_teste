<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase + GitHub Pages</title>
    <style>
        /* ... Seu estilo CSS permanece igual ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #4ecdc4; background: #16213e; color: #fff; }
        button { padding: 12px; border-radius: 8px; background: #4ecdc4; font-weight: bold; cursor: pointer; }
        #itensList { list-style: none; margin-top: 15px; }
        #itensList li { padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .status { text-align: center; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Conexão Supabase</h1>
        <section class="card">
            <h2>Adicionar Item</h2>
            <form id="addForm">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="descricao" placeholder="Descrição" required>
                <button type="submit">Salvar</button>
            </form>
        </section>
        <section class="card">
            <h2>Itens Cadastrados</h2>
            <button id="loadBtn">Carregar Dados</button>
            <ul id="itensList"></ul>
        </section> 
        <div id="status" class="status">Conectando...</div>
    </div>

    <!-- 1. BIBLIOTECA OFICIAL SUPABASE (Link Corrigido) -->
    <script src="https://jsdelivr.net"></script>

    <!-- 2. CONFIGURAÇÃO (Gerada pelo GitHub Actions) -->
    <script src="config.js"></script>

    <!-- 3. SEU SCRIPT (Com defer para carregar após o HTML) -->
    <script src="app.js" defer></script>
</body>
</html>
