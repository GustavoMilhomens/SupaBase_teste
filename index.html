<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase teste</title>
    <script type="module" src="app.js" defer></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #4ecdc4; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { text-align: center; margin-top: 10px; font-size: 0.9rem; }
        ul { list-style: none; padding: 0; }
        li { background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Novo Item</h2>
            <form id="addForm">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="descricao" placeholder="Descrição" required>
                <button type="submit">Salvar no Supabase</button>
            </form>
        </div>

        <div class="card">
            <h2>Itens</h2>
            <!-- <button id="btnCarregar">Carregar itens</button> -->
            <ul id="itensList"></ul>
        </div>
        <div id="status">Iniciando...</div>
    </div>

    <!-- <script>
        // Injeção de Variáveis pelo GitHub Actions
        window.SUPABASE_CONFIG = {
            url: "PLACEHOLDER_URL",
            key: "PLACEHOLDER_KEY"
        };
    </script> -->

    <!-- IMPORTANTE: type="module" permite usar o 'import' dentro do app.js -->
    
</body>
</html>
