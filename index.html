<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase + GitHub Pages</title>
    <style>
        /* ============================================
        ESTILO - Supabase + GitHub Pages
        ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #4ecdc4;
        }

        /* Formulário */
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #4ecdc4;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #45b7aa;
            transform: translateY(-2px);
        }

        /* Lista de itens */
        #itensList {
            list-style: none;
            margin-top: 15px;
        }

        #itensList li {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #itensList li button {
            padding: 6px 12px;
            font-size: 0.8rem;
            background: #ff6b6b;
            color: #fff;
        }

        /* Status */
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .status.success {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
        }

        .status.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Conexão Supabase</h1>
        
        <!-- Seção de Inserção de Dados -->
        <section class="card">
            <h2>Adicionar Item</h2>
            <form id="addForm">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="descricao" placeholder="Descrição" required>
                <button type="submit">Salvar</button>
            </form>
        </section>

        <!-- Seção de Listagem -->
        <section class="card">
            <h2>Itens Cadastrados</h2>
            <button id="loadBtn">Carregar Dados</button>
            <ul id="itensList"></ul>
        </section> 

        <!-- Status da Conexão -->
        <div id="status" class="status">Conectando...</div>
    </div>

    <!-- Supabase Client -->
     <!-- CDN do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Variáveis injetadas pelo GitHub Actions -->
    <script>
    window.SUPABASE_URL = "PLACEHOLDER_URL";
    window.SUPABASE_KEY = "PLACEHOLDER_KEY";
    </script>

    <!-- Seu app -->
    <script src="app.js"></script>
</body>
</html>
