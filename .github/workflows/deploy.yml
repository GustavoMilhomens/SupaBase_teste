name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Injetar variáveis no HTML
        run: |
          sed -i "s|PLACEHOLDER_URL|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|PLACEHOLDER_KEY|${{ secrets.SUPABASE_KEY }}|g" index.html

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./